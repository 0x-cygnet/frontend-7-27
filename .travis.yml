sudo: required
services:
  - docker

before_install:
  - docker build -t mybr0d0cker/docker -f Dockerfile.dev .

script:
  - docker run -e CI=true mybr0d0cker/docker npm run test

deploy:
  provider: elasticbeanstalk
  region: 'us-east-1'
  app: 'docker-test'
  env: 'dockertest-env'
  bucket_name: 'elasticbeanstalk-us-east-1-923445559289'
  bucket_path: 'docker-test'
  on:
    branch: main
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: $AWS_SECRET_KEY
